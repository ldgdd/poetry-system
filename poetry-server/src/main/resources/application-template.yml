server:
  port: 8088

spring:
  application:
    name: poetry-server

  datasource:
    url: jdbc:mysql://localhost:3306/poetry_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 你的MySQL密码           # ← 请替换为你的密码
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# JWT 配置
jwt:
  secret: 请替换为随机生成的256位密钥         # ← 生产环境请更换
  expiration: 86400000

# DeepSeek API 配置
deepseek:
  api:
    key: 你的DeepSeek_API_Key             # ← 请替换为你的API Key
    url: https://api.deepseek.com/v1/chat/completions
    model: deepseek-chat
